<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-optimized viewport with safe-area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
    
    <!-- PWA Configuration -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RoomCanvas" />
    
    <title>RoomCanvas — AI Interior Design Assistant</title>
    <meta name="description" content="Upload a photo of your room and get an AI-generated redesign with real furniture, dimension, and budget recommendations." />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#B76E4D" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1F1F1F" media="(prefers-color-scheme: dark)" />
    <meta name="msapplication-TileColor" content="#B76E4D" />
    <meta name="msapplication-TileImage" content="/branding/android-chrome-192x192.png" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/branding/logo.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/branding/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/branding/apple-touch-icon.png" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="RoomCanvas" />
    <meta property="og:description" content="See your room, redesigned." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/branding/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RoomCanvas — AI Interior Design" />
    <meta name="twitter:description" content="Upload a photo. Get a photorealistic redesign in 90 seconds." />
    <meta name="twitter:image" content="/branding/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
