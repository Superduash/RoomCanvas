services:
  - type: web
    name: roomcanvas-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        # Update this to your deployed frontend URL after Vercel deployment
        value: "https://your-vercel-frontend.vercel.app"
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
